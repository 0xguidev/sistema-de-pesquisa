<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Relatório</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      color: #111;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .meta {
      margin-bottom: 40px;
      color: #555;
    }

    .question {
      margin-bottom: 60px;
      page-break-inside: avoid;
    }

    h3 {
      margin-bottom: 20px;
      font-size: 18px;
    }

    canvas {
      max-width: 100%;
      margin-bottom: 20px;
    }

    .ranking {
      list-style: none;
      padding: 0;
      margin-top: 10px;
    }

    .ranking li {
      font-size: 12px;
      margin-bottom: 4px;
    }
  </style>
</head>

<body>
  <h1>Relatório de Pesquisa</h1>

  <div class="meta">
    <p><strong>ID:</strong> {{surveyId}}</p>
    <p><strong>Total de respostas:</strong> {{total}}</p>
    <p><strong>Gerado em:</strong> {{date}}</p>
  </div>

  {{content}}
</body>
</html>
